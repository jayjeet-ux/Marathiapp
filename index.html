<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marathi Writing App</title>
<style>
body{font-family:Arial;margin:40px;background:#f5f5f5}
.container{background:#fff;padding:30px;border-radius:10px;max-width:700px;margin:auto;box-shadow:0 5px 20px rgba(0,0,0,0.08)}
h2{margin-top:0}

button{
padding:12px 20px;
margin-top:15px;
cursor:pointer;
border:none;
background:black;
color:white;
border-radius:6px;
font-size:15px;
transition:all 0.15s ease;
}

button:hover{
background:#222;
}

button:active{
transform:scale(0.96);
}

button:disabled{
background:#999;
cursor:not-allowed;
}

input,select{
padding:10px;
width:100%;
margin-top:5px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

.tabBtn{background:#ddd;color:#000;margin-right:5px}
.activeTab{background:black;color:#fff}
.hidden{display:none}

.resultBox{
background:#f0f0f0;
padding:12px;
margin-top:10px;
border-radius:6px
}

.spinner{
width:16px;
height:16px;
border:2px solid #fff;
border-top:2px solid transparent;
border-radius:50%;
display:inline-block;
margin-left:8px;
animation:spin 0.6s linear infinite;
vertical-align:middle;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}
</style>
</head>

<body>

<div class="container">
<h2>Marathi Writing App</h2>

<div>
<button id="tabBtnRegister" class="tabBtn activeTab" onclick="showTab('register')">Register</button>
<button id="tabBtnTest" class="tabBtn" onclick="showTab('test')">Test</button>
<button id="tabBtnView" class="tabBtn" onclick="showTab('view')">View</button>
</div>

<div id="tabRegister">
<h3>Register Child</h3>
<label>Child Name</label>
<input id="regChildName" type="text">

<label>Grade</label>
<select id="regGrade">
<option value="">Select Grade</option>
<option value="1">Grade 1</option>
<option value="2">Grade 2</option>
<option value="3">Grade 3</option>
</select>

<label>Parent Email</label>
<input id="regParentEmail" type="email">

<button onclick="register()">Register</button>
</div>

<div id="tabTest" class="hidden">
<h3>Start Test</h3>
<label>Candidate Number</label>
<input id="testStudentId" type="text">

<label>PIN</label>
<input id="testPin" type="password">

<button onclick="startTest()">Start Test</button>

<div id="testArea"></div>
</div>

<div id="tabView" class="hidden">
<h3>View History</h3>
<label>Candidate Number</label>
<input id="viewStudentId" type="text">

<label>PIN</label>
<input id="viewPin" type="password">

<button onclick="viewHistory()">View</button>

<div id="historyArea"></div>
</div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz2nl0oVERYJXgr5cw7eeybwkQ_MgOtl5STlTD4GmpzWJoZuDNJ-y75RAYUE9ufuSnVqA/exec";

function showTab(which){
document.getElementById("tabRegister").classList.add("hidden");
document.getElementById("tabTest").classList.add("hidden");
document.getElementById("tabView").classList.add("hidden");

document.getElementById("tabBtnRegister").classList.remove("activeTab");
document.getElementById("tabBtnTest").classList.remove("activeTab");
document.getElementById("tabBtnView").classList.remove("activeTab");

if(which==="register"){
document.getElementById("tabRegister").classList.remove("hidden");
document.getElementById("tabBtnRegister").classList.add("activeTab");
}
if(which==="test"){
document.getElementById("tabTest").classList.remove("hidden");
document.getElementById("tabBtnTest").classList.add("activeTab");
}
if(which==="view"){
document.getElementById("tabView").classList.remove("hidden");
document.getElementById("tabBtnView").classList.add("activeTab");
}
}

async function register(){
const childName=document.getElementById("regChildName").value.trim();
const grade=document.getElementById("regGrade").value.trim();
const parentEmail=document.getElementById("regParentEmail").value.trim();

if(!childName||!grade||!parentEmail){alert("Fill all fields");return;}

const fd=new FormData();
fd.append("action","register");
fd.append("childName",childName);
fd.append("grade",grade);
fd.append("parentEmail",parentEmail);

const res=await fetch(API_URL,{method:"POST",body:fd});
const data=await res.json();

if(!data.ok){alert(data.message);return;}

alert("Registered. Username: "+data.studentId+" PIN: "+data.pin);
}

async function startTest(){
const studentId=document.getElementById("testStudentId").value.trim();
const pin=document.getElementById("testPin").value.trim();

if(!studentId||!pin){alert("Enter credentials");return;}

const res=await fetch(API_URL+"?action=getTest&studentId="+studentId+"&pin="+pin);
const data=await res.json();

if(!data.ok){alert(data.message);return;}

let html="";
for(let i=0;i<data.prompts.length;i++){
html+="<div class='resultBox'>"+(i+1)+". "+data.prompts[i]+"</div>";
}
document.getElementById("testArea").innerHTML=html;
}

async function viewHistory(){
const studentId=document.getElementById("viewStudentId").value.trim();
const pin=document.getElementById("viewPin").value.trim();

if(!studentId||!pin){alert("Enter credentials");return;}

const res=await fetch(API_URL+"?action=history&studentId="+studentId+"&pin="+pin);
const data=await res.json();

if(!data.ok){alert(data.message);return;}

let html="<h4>Lifetime Score: "+data.lifetimePercent+"%</h4>";

data.last6.forEach(function(a){
html+="<div class='resultBox'>";
html+="<b>"+a.submittedAtIso+"</b><br>";
html+="Score: "+a.attemptPercent+"%<br>";
html+="</div>";
});

document.getElementById("historyArea").innerHTML=html;
}
</script>

</body>
</html>
